<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Room Visualiser - Lucas Bovet | lucas-dev.ch</title>
    <meta name="description"
        content="Professional 3D room visualiser and architecture drafting tool. Plan your space in 2D and generate immersive 3D views instantly." />
    <meta name="keywords"
        content="Room Visualiser, Interior Design, 3D Architecture, Three.js, WebGL, Space Planning" />
    <meta name="author" content="Lucas Bovet" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lucas-dev.ch/visualiser.html" />
    <meta property="og:title" content="3D Room Visualiser - Lucas Bovet" />
    <meta property="og:description"
        content="Draft and visualize your interior design projects in real-time with this interactive 3D tool." />
    <meta property="og:image" content="https://lucas-dev.ch/profile.webp" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="3D Room Visualiser - Lucas Bovet" />
    <meta property="twitter:description"
        content="Draft and visualize your interior design projects in real-time with this interactive 3D tool." />
    <meta property="twitter:image" content="https://lucas-dev.ch/profile.webp" />

    <link rel="canonical" href="https://lucas-dev.ch/visualiser.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <header class="top-bar">
            <div class="logo-section">
                <a href="/" class="logo">LUCAS<span>.VISUALISER</span></a>
            </div>

            <div class="modes">
                <button id="draw-mode-btn" class="mode-btn active" title="2D Drawing Mode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </svg>
                    <span>Draw</span>
                </button>
                <button id="view-mode-btn" class="mode-btn" title="3D Viewing Mode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    <span>View</span>
                </button>
            </div>

            <div class="actions">
                <!-- Mobile Toggle Button -->
                <button id="toggle-library-btn" class="icon-btn mobile-only" title="Toggle Library">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <button id="clear-btn" class="secondary-btn desktop-only">Clear All</button>
                <button id="generate-btn" class="primary-btn">Generate 3D</button>
            </div>
        </header>

        <main class="viewport">
            <div id="canvas-container">
                <canvas id="grid-canvas"></canvas>
            </div>

            <aside id="furniture-panel" class="hidden">
                <div class="panel-header mobile-only">
                    <h3>Library</h3>
                    <button id="close-library-btn" class="icon-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <div id="structure-section" class="panel-section">
                    <h3>Structure</h3>
                    <div class="furniture-grid library-section">
                        <button class="draw-item-btn active" data-type="wall" title="Draw Wall">
                            <div class="icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <rect x="2" y="7" width="20" height="10" rx="2" ry="2" />
                                    <line x1="12" y1="7" x2="12" y2="17" />
                                    <line x1="7" y1="7" x2="7" y2="17" />
                                    <line x1="17" y1="7" x2="17" y2="17" />
                                </svg>
                            </div>
                            <span>Wall</span>
                        </button>
                        <button class="draw-item-btn" data-type="door" title="Place Door">
                            <div class="icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M3 21h18" />
                                    <path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16" />
                                    <path d="M15 13v.01" />
                                </svg>
                            </div>
                            <span>Door</span>
                        </button>
                        <button class="draw-item-btn" data-type="window" title="Place Window">
                            <div class="icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                    <line x1="3" y1="12" x2="21" y2="12" />
                                    <line x1="12" y1="3" x2="12" y2="21" />
                                </svg>
                            </div>
                            <span>Window</span>
                        </button>
                    </div>
                </div>

                <div id="furniture-section" class="panel-section">
                    <h3>Furniture</h3>
                    <div class="furniture-grid">
                        <div class="furniture-item" data-type="sofa" draggable="true" title="Drag to add Sofa">
                            <div class="icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M3 14h18" />
                                    <path d="M3 11v3" />
                                    <path d="M21 11v3" />
                                    <path d="M5 11V7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v4" />
                                    <path d="M3 17h18" />
                                </svg>
                            </div>
                            <span>Sofa</span>
                        </div>
                        <div class="furniture-item" data-type="table" draggable="true" title="Drag to add Table">
                            <div class="icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M3 8h18" />
                                    <path d="M4 8v11" />
                                    <path d="M20 8v11" />
                                    <path d="M8 8v11" />
                                    <path d="M16 8v11" />
                                </svg>
                            </div>
                            <span>Table</span>
                        </div>
                        <div class="furniture-item" data-type="bed" draggable="true" title="Drag to add Bed">
                            <div class="icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M2 4v16" />
                                    <path d="M2 11h18a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H2" />
                                    <path d="M2 17h20" />
                                    <path d="M22 17v3" />
                                </svg>
                            </div>
                            <span>Bed</span>
                        </div>
                        <div class="furniture-item" data-type="lamp" draggable="true" title="Drag to add Lamp">
                            <div class="icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M12 2v1" />
                                    <path d="M12 18h.01" />
                                    <path d="M8 12h8" />
                                    <path d="M12 3v15" />
                                    <path d="M9 22h6" />
                                </svg>
                            </div>
                            <span>Lamp</span>
                        </div>
                    </div>
                </div>
            </aside>

            <div id="instructions" class="toast">Draw walls, doors, or windows</div>
            <!-- Mobile Overlay -->
            <div id="mobile-overlay" class="mobile-overlay hidden"></div>
        </main>
    </div>
    <script type="module" src="/src/visualiser.js"></script>
</body>

</html>
