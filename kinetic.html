<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/icon.png">
    <title>Kinetic Type Experiment - Lucas Bovet</title>
    <meta name="description" content="Interactive 3D Kinetic Typography experiment using Cannon.js physics." />
    <meta name="author" content="Lucas Bovet" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lucas.bovet.dev/kinetic.html" />
    <meta property="og:title" content="Kinetic Type Experiment" />
    <meta property="og:description" content="Interactive 3D Kinetic Typography using physics simulation." />
    <meta property="og:image" content="https://lucas.bovet.dev/profile.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:image" content="https://lucas.bovet.dev/profile.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        canvas.webgl {
            position: fixed;
            top: 0;
            left: 0;
            outline: none;
        }

        .ui-layer {
            position: fixed;
            top: 2rem;
            left: 2rem;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #64ffda;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            pointer-events: auto;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }

        .back-link:hover {
            border-color: #64ffda;
        }

        /* Preview Mode Hides UI */
        body.is-preview .ui-layer {
            display: none !important;
        }
    </style>
</head>

<body>
    <canvas class="webgl"></canvas>
    <div class="ui-layer">
        <h1>Kinetic Type</h1>
        <a href="/" class="back-link">&larr; Back to Portfolio</a>
    </div>
    <script type="module" src="/src/kinetic.js"></script>
</body>

</html>
