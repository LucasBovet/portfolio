<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freitag 3D Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <style>
    :root {
      --bg:     #050505;
      --text:   #e1e1e1;
      --accent: #64ffda;
      --glass:  rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --font:   'Outfit', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Canvas ── */
    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }

    /* ── Back button ── */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 30px;
      backdrop-filter: blur(12px);
      color: var(--text);
      text-decoration: none;
      font-family: var(--font);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: border-color 0.3s, color 0.3s, background 0.3s;
    }
    .back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(100, 255, 218, 0.05);
    }
    .back-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Model selector ── */
    #model-buttons {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 12px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 16px;
      backdrop-filter: blur(16px);
    }

    .model-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.25s, background 0.25s, opacity 0.25s;
      padding: 10px;
      position: relative;
    }
    .model-btn svg { width: 100%; height: 100%; }
    .model-btn .cls-1 { transition: stroke 0.25s; }

    .model-btn:hover:not(.is-active):not(.is-loading):not(.is-error) {
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.04);
    }

    .model-btn.is-active {
      border-color: var(--accent);
      background: rgba(100, 255, 218, 0.08);
    }
    .model-btn.is-active .cls-1 { stroke: var(--accent) !important; }

    .model-btn.is-loading { opacity: 0.5; cursor: wait; }
    .model-btn.is-error   { opacity: 0.3; cursor: not-allowed; }

    /* small dot indicator */
    .model-btn::after {
      content: '';
      position: absolute;
      bottom: 3px; right: 3px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: transparent;
      transition: background 0.25s;
    }
    .model-btn.is-error::after   { background: #ff6464; }
    .model-btn.is-loading::after { background: #ffda64; animation: blink 0.8s ease-in-out infinite; }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

    /* ── Touch hint ── */
    #touch-hint {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em;
      pointer-events: none;
      white-space: nowrap;
      animation: fadeHint 4s ease forwards 2s;
      opacity: 0;
    }
    @keyframes fadeHint {
      0%   { opacity: 0; transform: translateX(-50%) translateY(4px); }
      20%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Loading overlay ── */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--bg);
      transition: opacity 0.6s ease;
    }
    #loader.fade-out { opacity: 0; pointer-events: none; }

    .loader-ring {
      width: 48px; height: 48px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-label {
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .progress-track {
      width: 160px; height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 1px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.2s ease;
      box-shadow: 0 0 8px var(--accent);
    }

    /* ── Error toast ── */
    #error-toast {
      display: none;
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      padding: 10px 20px;
      background: rgba(255, 80, 80, 0.12);
      border: 1px solid rgba(255, 80, 80, 0.3);
      border-radius: 30px;
      backdrop-filter: blur(12px);
      font-size: 0.75rem;
      color: #ff8080;
      letter-spacing: 0.05em;
    }

    /* ── Lottie loader ── */
    #lottie-loader {
      position: fixed;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 201;
      width: 600px;
      height: 600px;
      pointer-events: none;
      transition: opacity 0.5s ease-out;
    }
    #lottie-loader.fade-out { opacity: 0; }

    /* ── Embedded mode: hide chrome ── */
    body.is-embedded .back-btn,
    body.is-embedded #model-buttons,
    body.is-embedded #touch-hint { display: none !important; }
  </style>
</head>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader }   from 'three/addons/loaders/DRACOLoader.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // ── Model registry ──────────────────────────────────────────────
  const MODELS = {
    model1: '/freitag_build/model/model1.glb',
    smile:  '/freitag_build/model/dices.glb',
    dices:  '/freitag_build/model/smile.glb',
  };

  const LOTTIE_FILES = {
    model1: '/freitag_build/loader/1.json',
    smile:  '/freitag_build/loader/2.json',
    dices:  '/freitag_build/loader/3.json',
  };

  // ── Scene ────────────────────────────────────────────────────────
  const canvas   = document.getElementById('canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping      = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type    = THREE.PCFSoftShadowMap;

  const scene  = new THREE.Scene();
  scene.background = new THREE.Color(0x050505);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
  camera.position.set(0, 0.5, 3.5);

  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping  = true;
  controls.dampingFactor  = 0.06;
  controls.minDistance    = 1;
  controls.maxDistance    = 8;
  controls.enablePan      = false;
  controls.autoRotate     = true;
  controls.autoRotateSpeed = 0.6;

  // ── Lighting ─────────────────────────────────────────────────────
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);

  const key = new THREE.DirectionalLight(0xffffff, 2.5);
  key.position.set(3, 5, 4);
  key.castShadow = true;
  scene.add(key);

  const fill = new THREE.DirectionalLight(0x64ffda, 0.4);   // accent tint
  fill.position.set(-4, 2, -3);
  scene.add(fill);

  const rim = new THREE.DirectionalLight(0xffffff, 0.8);
  rim.position.set(0, -3, -4);
  scene.add(rim);

  // Subtle environment gradient
  const hemi = new THREE.HemisphereLight(0x111122, 0x050505, 0.5);
  scene.add(hemi);

  // ── Loaders ──────────────────────────────────────────────────────
  const draco = new DRACOLoader();
  draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

  const gltfLoader = new GLTFLoader();
  gltfLoader.setDRACOLoader(draco);

  // ── State ─────────────────────────────────────────────────────────
  let currentModel = null;
  let isLoading    = false;
  const modelCache = {};          // cache loaded scenes
  const modelErrors = new Set();  // track which models failed

  // ── Loaders ──────────────────────────────────────────────────────
  const loaderEl   = document.getElementById('loader');
  const progressEl = document.getElementById('progress-bar');
  const labelEl    = document.getElementById('loader-label');
  const toastEl    = document.getElementById('error-toast');
  const lottieEl   = document.getElementById('lottie-loader');

  // ── Lottie ───────────────────────────────────────────────────────
  let lottieAnim = null;

  async function showLottie(key) {
    lottieEl.style.display = 'block';
    lottieEl.classList.remove('fade-out');
    if (lottieAnim) { lottieAnim.destroy(); lottieAnim = null; }
    try {
      const data = await fetch(LOTTIE_FILES[key]).then(r => r.json());
      lottieAnim = lottie.loadAnimation({
        container: lottieEl,
        renderer: 'svg',
        loop: true,
        autoplay: true,
        animationData: data,
      });
    } catch(e) { /* spinner still shows */ }
  }

  function hideLottie() {
    lottieEl.classList.add('fade-out');
    setTimeout(() => {
      lottieEl.style.display = 'none';
      if (lottieAnim) { lottieAnim.destroy(); lottieAnim = null; }
    }, 550);
  }

  function showLoader(key) {
    loaderEl.style.display = 'flex';
    loaderEl.classList.remove('fade-out');
    setProgress(0);
    labelEl.textContent = 'Loading';
    showLottie(key);
  }

  function hideLoader() {
    hideLottie();
    loaderEl.classList.add('fade-out');
    setTimeout(() => loaderEl.style.display = 'none', 650);
  }

  function setProgress(pct) {
    progressEl.style.width = pct + '%';
  }

  function showToast(msg, duration = 3500) {
    toastEl.textContent = msg;
    toastEl.style.display = 'block';
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(() => toastEl.style.display = 'none', duration);
  }

  // Deep-clone a cached scene with independent materials
  function deepClone(source) {
    const clone = source.clone(true);
    clone.traverse(obj => {
      if (obj.isMesh) {
        obj.material = Array.isArray(obj.material)
          ? obj.material.map(m => m.clone())
          : obj.material.clone();
      }
    });
    return clone;
  }

  // ── Load model ────────────────────────────────────────────────────
  function loadModel(key) {
    if (isLoading || modelErrors.has(key)) return;

    showLoader(key);

    // If already cached, clone with independent materials and swap
    if (modelCache[key]) {
      const clone = deepClone(modelCache[key]);
      swapModel(clone);
      setActiveButton(key);
      setTimeout(hideLoader, 300);
      return;
    }

    isLoading = true;
    setButtonState(key, 'loading');

    gltfLoader.load(
      MODELS[key],

      // ── onLoad ──
      (gltf) => {
        // Auto-scale & centre
        const box    = new THREE.Box3().setFromObject(gltf.scene);
        const size   = box.getSize(new THREE.Vector3());
        const centre = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = 2.0 / maxDim;
        gltf.scene.scale.setScalar(scale);
        gltf.scene.position.sub(centre.multiplyScalar(scale));
        gltf.scene.rotation.y = Math.PI / 4;

        // Shadows
        gltf.scene.traverse(obj => {
          if (obj.isMesh) obj.castShadow = obj.receiveShadow = true;
        });

        modelCache[key] = gltf.scene;
        swapModel(deepClone(gltf.scene));
        setActiveButton(key);
        isLoading = false;
        setProgress(100);
        hideLoader();
      },

      // ── onProgress ──
      (xhr) => {
        if (xhr.lengthComputable) {
          const pct = Math.round(xhr.loaded / xhr.total * 100);
          setProgress(pct);
          labelEl.textContent = `Loading ${pct}%`;
        }
      },

      // ── onError ──
      (err) => {
        console.error(`Failed to load model "${key}":`, err);
        modelErrors.add(key);
        setButtonState(key, 'error');
        isLoading = false;
        hideLoader();
        showToast(`Couldn't load this model — try another`);

        if (!currentModel) {
          const fallback = Object.keys(MODELS).find(k => !modelErrors.has(k));
          if (fallback) loadModel(fallback);
        }
      }
    );
  }

  // ── Swap with fade ────────────────────────────────────────────────
  function swapModel(newScene) {
    if (currentModel) {
      // Fade out old
      const old = currentModel;
      let t = 0;
      const fadeOut = setInterval(() => {
        t += 0.08;
        old.traverse(o => { if (o.isMesh && o.material) o.material.transparent = true, o.material.opacity = Math.max(0, 1 - t); });
        if (t >= 1) { clearInterval(fadeOut); scene.remove(old); }
      }, 16);
    }

    // Fade in new
    newScene.traverse(o => { if (o.isMesh && o.material) o.material.transparent = true, o.material.opacity = 0; });
    scene.add(newScene);
    currentModel = newScene;

    let t = 0;
    const fadeIn = setInterval(() => {
      t += 0.05;
      newScene.traverse(o => { if (o.isMesh && o.material) o.material.opacity = Math.min(1, t); });
      if (t >= 1) {
        clearInterval(fadeIn);
        newScene.traverse(o => { if (o.isMesh && o.material) o.material.transparent = false; });
      }
    }, 16);
  }

  // ── Button helpers ────────────────────────────────────────────────
  function setActiveButton(key) {
    document.querySelectorAll('.model-btn').forEach(btn => {
      btn.classList.remove('is-active', 'is-loading');
      if (btn.dataset.model === key) btn.classList.add('is-active');
    });
  }

  function setButtonState(key, state) {
    const btn = document.querySelector(`.model-btn[data-model="${key}"]`);
    if (!btn) return;
    btn.classList.remove('is-active', 'is-loading', 'is-error');
    btn.classList.add(`is-${state}`);
  }

  // ── Button click ─────────────────────────────────────────────────
  document.getElementById('model-buttons').addEventListener('click', e => {
    const btn = e.target.closest('.model-btn');
    if (!btn || btn.classList.contains('is-active') || btn.classList.contains('is-error')) return;
    loadModel(btn.dataset.model);
    controls.autoRotate = true;
  });

  // Stop auto-rotate on manual interaction
  controls.addEventListener('start', () => controls.autoRotate = false);

  // ── Resize ───────────────────────────────────────────────────────
  function resize() {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Render loop ──────────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ── Initial load ─────────────────────────────────────────────────
  loadModel('model1');
  </script>
</body>
</html>
