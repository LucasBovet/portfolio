  <div id="lottie-loader"
    style="position: fixed; top: 55%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; width: 1000px; height: 1000px;">
  </div>
  <div id="vanta-bg">
    <canvas class="webgl"></canvas>
  </div>
  <div id="touch-hint">Use your fingers to rotate and zoom the model</div>

  <style>
    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    #loader {
      display: block;
    }

    #loader.hidden {
      display: none;
    }

    #lottie-loader.fade-out {
      opacity: 0;
      transition: opacity 0.5s ease-out;
    }

    /* Hide UI only when embedded (class added by script) */
    body.is-embedded #touch-hint,
    body.is-embedded #burger-menu,
    body.is-embedded #model-buttons,
    body.is-embedded .back-button {
      display: none !important;
    }

    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1001;
      color: white;
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 20px;
      border-radius: 30px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    .back-button:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #64ffda;
      color: #64ffda;
    }
  </style>
  <script>
    // Detect if running inside an iframe
    if (window.self !== window.top) {
      document.body.classList.add('is-embedded');
    }
  </script>

  <a href="/" class="back-button">← Back to Portfolio</a>
