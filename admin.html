<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Updates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #050505;
            --color-text: #e1e1e1;
            --color-accent: #64ffda;
            --font-primary: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .admin-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            color: var(--color-accent);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem;
            color: white;
            font-family: inherit;
            border-radius: 4px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: transparent;
            border: 1px solid var(--color-accent);
            color: var(--color-accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            background: var(--color-accent);
            color: var(--color-bg);
        }

        #message {
            margin-top: 1rem;
            font-size: 0.9rem;
            text-align: center;
        }

        .success { color: #64ffda; }
        .error { color: #ff5555; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h1>New Update</h1>
        <form id="update-form">
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>Date (defaults to today)</label>
                <input type="date" id="date">
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="title" required placeholder="e.g. New Physics Feature">
            </div>
            <div class="form-group">
                <label>Upload Image (optional)</label>
                <input type="file" id="imageFile" accept="image/*">
            </div>
            <div class="form-group">
                <label>Content</label>
                <textarea id="content" rows="5" required placeholder="What did you do this week?"></textarea>
            </div>
            <div class="form-group">
                <label>Tags (comma separated)</label>
                <input type="text" id="tags" placeholder="Three.js, UI, Optimization">
            </div>
            <button type="submit">Post Update</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        // Set today's date as default
        document.getElementById('date').valueAsDate = new Date();

        let imageDataUrl = null;
        document.getElementById('imageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 3 * 1024 * 1024) {
                    alert("Warning: File is larger than 3MB. Vercel serverless has a strict 4.5MB request limit!");
                }
                const reader = new FileReader();
                reader.onload = function(event) {
                    imageDataUrl = event.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                imageDataUrl = null;
            }
        });

        document.getElementById('update-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageEl = document.getElementById('message');
            messageEl.textContent = 'Posting...';
            
            const data = {
                password: document.getElementById('password').value,
                date: document.getElementById('date').value,
                title: document.getElementById('title').value,
                imageUrl: imageDataUrl,
                content: document.getElementById('content').value,
                tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t)
            };

            try {
                const response = await fetch('/api/updates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    messageEl.className = 'success';
                    messageEl.textContent = 'Update posted successfully!';
                    document.getElementById('update-form').reset();
                    imageDataUrl = null;
                } else {
                    const err = await response.json();
                    messageEl.className = 'error';
                    messageEl.textContent = 'Error: ' + (err.error || 'Failed to post');
                }
            } catch (error) {
                messageEl.className = 'error';
                messageEl.textContent = 'Connection failed.';
            }
        });
    </script>
</body>
</html>
