<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/icon.png">
    <title>3D Physics Bucket - Lucas Bovet | lucas-dev.ch</title>
    <meta name="description"
        content="Interactive 3D physics simulation featuring an open-top bucket, glass materials, and real-time rigid body dynamics. Built with Three.js and Cannon.js." />
    <meta name="keywords" content="3D Physics, Three.js, Cannon.js, WebGL, Creative Coding, Interaction Design" />
    <meta name="author" content="Lucas Bovet" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lucas-dev.ch/physics.html" />
    <meta property="og:title" content="3D Physics Bucket - Lucas Bovet" />
    <meta property="og:description"
        content="Experience high-performance 3D physics with instanced rendering and interactive controls." />
    <meta property="og:image" content="https://lucas-dev.ch/profile.webp" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="3D Physics Bucket - Lucas Bovet" />
    <meta property="twitter:description"
        content="Experience high-performance 3D physics with instanced rendering and interactive controls." />
    <meta property="twitter:image" content="https://lucas-dev.ch/profile.webp" />

    <link rel="canonical" href="https://lucas-dev.ch/physics.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        canvas.webgl {
            position: fixed;
            top: 0;
            left: 0;
            outline: none;
        }

        .back-button {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 10;
            color: white;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-5px);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #64ffda;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* Preview Mode Hides UI */
        body.is-preview .back-button,
        body.is-preview .loading-overlay,
        body.is-preview .lil-gui {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loader">
        <div class="loader"></div>
        <p>Initializing Physics...</p>
    </div>

    <a href="/" class="back-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        Back to Portfolio
    </a>

    <canvas class="webgl"></canvas>

    <script type="module" src="/src/physics.js"></script>
</body>

</html>
