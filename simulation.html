<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walking Simulation - Lucas Bovet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        canvas.webgl {
            position: fixed;
            top: 0;
            left: 0;
            outline: none;
        }

        .ui-overlay {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
        }

        .controls-hint {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .key-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .key-row {
            display: flex;
            gap: 5px;
        }

        .key {
            width: 35px;
            height: 35px;
            border: 2px solid #fff;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .back-button {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 10;
            color: white;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-5px);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loader">
        <div class="loader"></div>
        <p>Loading Simulation...</p>
    </div>

    <a href="/" class="back-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        Back to Portfolio
    </a>

    <div class="ui-overlay">
        <div class="controls-hint keyboard-only">
            <div class="key-group">
                <div class="key">W</div>
                <div class="key-row">
                    <div class="key">A</div>
                    <div class="key">S</div>
                    <div class="key">D</div>
                </div>
            </div>
            <div>
                <p style="margin: 0; font-size: 14px; opacity: 0.8;">Move Character</p>
                <p style="margin: 0; font-size: 12px; opacity: 0.5;">Shift to Run</p>
            </div>
        </div>
    </div>

    <!-- Mobile Controls -->
    <div class="mobile-controls">
        <div class="control-row">
            <button id="btn-up" class="control-btn">↑</button>
        </div>
        <div class="control-row">
            <button id="btn-left" class="control-btn">←</button>
            <button id="btn-down" class="control-btn">↓</button>
            <button id="btn-right" class="control-btn">→</button>
        </div>
        <button id="btn-run" class="run-btn">RUN</button>
    </div>

    <canvas class="webgl"></canvas>

    <style>
        .mobile-controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 20;
            pointer-events: auto;
        }

        .control-row {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .run-btn {
            margin-top: 10px;
            width: 100px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            user-select: none;
        }

        .run-btn.active {
            background: rgba(255, 255, 255, 0.4);
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
            }

            .keyboard-only {
                display: none;
            }
        }

        /* Preview Mode Hides UI */
        body.is-preview .back-button,
        body.is-preview .ui-overlay,
        body.is-preview .mobile-controls,
        body.is-preview .loading-overlay {
            display: none !important;
        }
    </style>

    <script type="module" src="/src/simulation.js"></script>
</body>

</html>
